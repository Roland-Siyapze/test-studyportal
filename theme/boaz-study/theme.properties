# ─────────────────────────────────────────────────────────────────
# BOAZ-STUDY Keycloak Theme Configuration
# ─────────────────────────────────────────────────────────────────
#
# This theme provides a custom branded experience for Keycloak login,
# registration, and email pages aligned with the BOAZ-STUDY visual identity.
#
# Theme colors follow the specification:
#   - Navy:      #0A1628 (primary background)
#   - Blue Gradient: #1E3A8A → #3B82F6 (interactive elements)
#   - Gold:      #F59E0B (accents, highlights)
#   - Surface:   #162A50 (secondary backgrounds)
#

parent=base
import=common/keycloak

# ─────────────────────────────────────────────────────────────────
# Branding
# ─────────────────────────────────────────────────────────────────

company-name=BOAZ-STUDY
locale=en,fr

# ─────────────────────────────────────────────────────────────────
# Design tokens
# ─────────────────────────────────────────────────────────────────

# Primary colors
color-primary-navy=#0A1628
color-primary-blue=#1E3A8A
color-primary-blue-mid=#2563EB
color-primary-blue-light=#3B82F6
color-primary-gold=#F59E0B
color-primary-gold-light=#FCD34D

# Neutral palette
color-surface-primary=#0F2040
color-surface-secondary=#162A50
color-text-primary=#E2E8F0
color-text-secondary=#94A3B8
color-border-default=#1E3A5F
color-error=#EF4444

# Typography
font-display=Playfair Display, Georgia, serif
font-body=DM Sans, sans-serif
font-mono=JetBrains Mono, monospace

# ─────────────────────────────────────────────────────────────────
# Asset configuration
# ─────────────────────────────────────────────────────────────────

# Logo and favicon paths (relative to theme directory)
logos.url.main=img/boaz-logo.svg
logos.url.favicon=img/favicon.ico

# Background images
background.image.url=img/background-pattern.svg

# ─────────────────────────────────────────────────────────────────
# Keycloak-specific settings
# ─────────────────────────────────────────────────────────────────

# Internationalization
locale.default=en
locale.supported=en,fr

# Session behavior
# (Note: These are typically configured server-side in keycloak.json)
